<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记应用 - 设计预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .glass-card {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.2s ease;
        }

        .dark .glass-card {
            background: #2C2C2E;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .note-card {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .note-card:hover {
            background: rgba(255, 184, 0, 0.03);
        }

        .dark .note-card:hover {
            background: rgba(255, 184, 0, 0.05);
        }

        .gradient-fab {
            background: #FFB800;
            box-shadow: 0 10px 30px -5px rgba(255, 184, 0, 0.5);
        }

        .gradient-fab:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px -5px rgba(255, 184, 0, 0.6);
        }
        
        .category-tag {
            background: rgba(255, 184, 0, 0.1);
        }

        .dark .category-tag {
            background: rgba(255, 184, 0, 0.15);
        }

        .icon-btn {
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 184, 0, 0.1);
            color: #FFB800;
        }

        .dark .icon-btn:hover {
            background: rgba(255, 184, 0, 0.2);
        }

        .nav-item {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            background: rgba(255, 184, 0, 0.08);
        }

        .nav-item.active {
            background: rgba(255, 184, 0, 0.1);
        }
        
        /* 全局滚动条 */
        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(156, 163, 175, 0.5) transparent;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.8);
        }
    </style>
</head>
<body class="bg-white dark:bg-black min-h-screen">
    <!-- 手机框架 -->
    <div class="flex justify-center items-center min-h-screen p-4">
        <div class="relative w-[375px] h-[812px] bg-white dark:bg-[#1C1C1E] rounded-[50px] shadow-2xl overflow-hidden border-8 border-gray-900">
            <!-- 状态栏 -->
            <div class="absolute top-0 left-0 right-0 h-12 bg-white dark:bg-[#1C1C1E] z-50 flex items-center justify-between px-6">
                <span class="text-sm font-semibold text-gray-900 dark:text-white">9:41</span>
                <div class="flex items-center gap-1">
                    <i class="fas fa-signal text-xs text-gray-900 dark:text-white"></i>
                    <i class="fas fa-wifi text-xs text-gray-900 dark:text-white"></i>
                    <i class="fas fa-battery-full text-xs text-gray-900 dark:text-white"></i>
                </div>
            </div>
            
            <!-- 主内容区 -->
            <div class="h-full overflow-y-auto pt-12 pb-24">
                <!-- 顶部导航 -->
                <div class="px-5 pt-4 pb-2">
                    <div class="flex items-center justify-between mb-3">
                        <!-- 标题和下拉 -->
                        <div class="flex items-center gap-1 cursor-pointer group">
                            <h1 class="text-2xl font-medium text-gray-900 dark:text-white">全部笔记</h1>
                            <i class="fas fa-chevron-down text-sm text-gray-400 group-hover:text-yellow-500 transition-colors"></i>
                        </div>
                        
                        <!-- 右侧按钮组 -->
                        <div class="flex items-center gap-2">
                            <button class="icon-btn w-10 h-10 rounded-xl flex items-center justify-center bg-[#F2F2F7] dark:bg-[#3A3A3C] shadow-sm text-gray-600 dark:text-gray-300">
                                <i class="fas fa-search text-sm"></i>
                            </button>
                            <button class="icon-btn w-10 h-10 rounded-xl flex items-center justify-center bg-[#F2F2F7] dark:bg-[#3A3A3C] shadow-sm text-gray-600 dark:text-gray-300">
                                <i class="fas fa-sync-alt text-sm"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 笔记数量 -->
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-normal">4 条笔记</p>
                </div>
                
                <!-- 笔记列表 -->
                <div class="px-4 space-y-1 mt-2">
                    <!-- 笔记卡片 1 -->
                    <div class="note-card glass-card rounded-2xl px-4 py-3">
                        <h3 class="font-medium text-gray-900 dark:text-white text-[17px] leading-tight truncate">刷新动画</h3>
                        <p class="text-sm font-normal text-gray-600 dark:text-gray-400 truncate mt-1">
                            实现下拉刷新时的流畅动画效果，提升用户体验...
                        </p>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-normal text-gray-400">今天 14:30</span>
                            <span class="category-tag text-[10px] font-medium text-yellow-600 dark:text-yellow-400 px-2 py-0.5 rounded-full">note开发</span>
                        </div>
                    </div>
                    
                    <!-- 笔记卡片 2 -->
                    <div class="note-card glass-card rounded-2xl px-4 py-3">
                        <h3 class="font-medium text-gray-900 dark:text-white text-[17px] leading-tight truncate">手机 📱</h3>
                        <p class="text-sm font-normal text-gray-600 dark:text-gray-400 truncate mt-1">
                            记录手机使用技巧和常用设置，方便日后查阅...
                        </p>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-normal text-gray-400">昨天 18:20</span>
                            <span class="category-tag text-[10px] font-medium text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded-full">手机</span>
                        </div>
                    </div>
                    
                    <!-- 笔记卡片 3 -->
                    <div class="note-card glass-card rounded-2xl px-4 py-3">
                        <h3 class="font-medium text-gray-900 dark:text-white text-[17px] leading-tight truncate">音乐</h3>
                        <p class="text-sm font-normal text-gray-600 dark:text-gray-400 truncate mt-1">
                            收藏喜欢的歌曲和歌单，记录音乐灵感...
                        </p>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-normal text-gray-400">2天前</span>
                            <span class="category-tag text-[10px] font-medium text-pink-600 dark:text-pink-400 px-2 py-0.5 rounded-full">音乐</span>
                        </div>
                    </div>
                    
                    <!-- 笔记卡片 4 -->
                    <div class="note-card glass-card rounded-2xl px-4 py-3">
                        <h3 class="font-medium text-gray-900 dark:text-white text-[17px] leading-tight truncate">彩礼</h3>
                        <p class="text-sm font-normal text-gray-600 dark:text-gray-400 truncate mt-1">
                            婚礼筹备事项清单，记录各项预算和安排...
                        </p>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-normal text-gray-400">3天前</span>
                            <span class="category-tag text-[10px] font-medium text-orange-600 dark:text-orange-400 px-2 py-0.5 rounded-full">婚礼</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 底部导航栏 -->
            <div class="absolute bottom-0 left-0 right-0 bg-white dark:bg-[#1C1C1E] border-t border-gray-100 dark:border-[#38383A]">
                <div class="flex items-center justify-around py-2 px-6">
                    <button class="nav-item active flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-yellow-600">
                        <i class="far fa-file-alt text-lg"></i>
                        <span class="text-xs font-medium">笔记</span>
                    </button>
                    <button class="nav-item flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-gray-400 hover:text-yellow-600 transition-colors">
                        <i class="fas fa-archive text-lg"></i>
                        <span class="text-xs font-medium">归档</span>
                    </button>
                    <button class="nav-item flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-gray-400 hover:text-yellow-600 transition-colors">
                        <i class="fas fa-cog text-lg"></i>
                        <span class="text-xs font-medium">设置</span>
                    </button>
                </div>
            </div>
            
            <!-- 浮动添加按钮 -->
            <button class="absolute bottom-20 right-5 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <i class="fas fa-plus"></i>
            </button>
            
            <!-- Home Indicator -->
            <div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
        </div>
    </div>
    
    <!-- 主题切换按钮 -->
    <button onclick="toggleTheme()" class="fixed top-5 right-5 w-12 h-12 rounded-full bg-white dark:bg-[#1C1C1E] shadow-lg flex items-center justify-center text-gray-700 dark:text-yellow-400 hover:scale-110 transition-transform cursor-pointer">
        <i class="fas fa-moon dark:hidden"></i>
        <i class="fas fa-sun hidden dark:block"></i>
    </button>
    
    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</body>
</html>
